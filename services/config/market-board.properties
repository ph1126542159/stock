service.name = stok.market-board
service.version = 0.1.0
service.environment = dev

telemetry.export.enabled = false
telemetry.export.traces = true
telemetry.export.logs = true
telemetry.export.metrics = true
telemetry.export.otlp.endpoint =
telemetry.export.otlp.tracesPath = /v1/traces
telemetry.export.otlp.logsPath = /v1/logs
telemetry.export.otlp.metricsPath = /v1/metrics
telemetry.export.otlp.timeout = 1000
telemetry.export.otlp.scheduleDelay = 1000
telemetry.export.metrics.interval = 3000

logging.file.path = logs/market-board.log

dds.domainId = 42
dds.topic = stok.market.quotes
dds.hostedViewTopic = stok.ui.hosted-views
dds.configTopic = stok.ui.config
dds.logTopic = stok.ui.logs
dds.localeTopic = stok.ui.locale

ui.menu.id = market-board
ui.menu.title =
ui.menu.group = main

storage.cacheDir = data/market-board
storage.sqlitePath = data/market-board/market-board.db
update.institutions.intervalMs = 3600000
update.usMarket.intervalMs = 1000
update.valueBoard.intervalMs = 300000
update.freeData.intervalMs = 300000

# Leave provider.command blank to use the bundled embeddable Python that the
# CMake StokPythonBundle module installs to <appDir>/python-embed/python.exe.
# Override only when developing without the bundle (e.g. command = py).
freeData.provider.command =
freeData.provider.script = ../../tools/free_data_provider.py

# Real-data value-investment board provider (replaces LLM/codex path).
# Pulls fund NAV + A/HK quotes from akshare and scores with a transparent
# multi-factor formula. Runs once per update.valueBoard.intervalMs and on
# navigation to a wealth institution. The first run takes ~30-60s.
valueBoard.provider.command =
valueBoard.provider.script = ../../tools/value_board_provider.py
valueBoard.provider.timeoutMs = 240000

codex.command =
codex.model =
codex.timeoutMs = 180000
codex.workDir = .
