service.name = stok.valuation-research
service.version = 0.1.0
service.environment = dev

dds.domainId = 42
dds.topic = stok.market.quotes
dds.hostedViewTopic = stok.ui.hosted-views
dds.logTopic = stok.ui.logs
dds.localeTopic = stok.ui.locale

telemetry.export.enabled = false
telemetry.export.traces = true
telemetry.export.logs = true
telemetry.export.metrics = true
telemetry.export.otlp.endpoint =
telemetry.export.otlp.tracesPath = /v1/traces
telemetry.export.otlp.logsPath = /v1/logs
telemetry.export.otlp.metricsPath = /v1/metrics
telemetry.export.otlp.timeout = 1000
telemetry.export.otlp.scheduleDelay = 1000
telemetry.export.metrics.interval = 3000

logging.file.path = logs/valuation-research.log

ui.menu.id = valuation-research
ui.menu.title = 估值研究
ui.menu.description = DCF、PE/PB 分位、股息率、ROE/ROIC、自由现金流质量与研究档案
ui.menu.group = main

# Storage path for the valuation research SQLite cache.
storage.cacheDir = data/valuation-research
storage.sqlitePath = data/valuation-research/valuation-research.db

# Real-data DCF + factor provider. Leave provider.command blank to use the
# bundled embeddable Python under <appDir>/python-embed/python.exe.
valuation.provider.command =
valuation.provider.script = ../../tools/valuation_research_provider.py
valuation.provider.timeoutMs = 480000

# DCF assumptions, runtime-tunable via config-center DDS topic.
valuation.dcf.discountRate = 0.085
valuation.dcf.terminalGrowth = 0.025
valuation.dcf.growthRate = 0.06
valuation.dcf.horizonYears = 10
valuation.dcf.historyYears = 8
valuation.bands.buyMultiplier = 0.85
valuation.bands.sellMultiplier = 1.18

# Refresh interval in ms. Default 30 minutes; set lower at your own risk
# (each run takes ~4-5 minutes due to the A-share batched spot scan).
update.valuation.intervalMs = 1800000

# Default watchlist: A:600519,A:000333,... formatted entries.
watchlist.default = A:600519,A:000333,A:600036,A:000651,A:601318,A:601398,A:600900,A:000858,HK:00700,HK:00941
