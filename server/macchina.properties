#
# OSP Configuration
#
osp.codeCache          = ${application.dir}codeCache
osp.bundleRepository   = ${application.dir}../bundles
osp.data               = ${application.configDir}data
osp.web.cacheResources = false
osp.web.sessionManager.cookiePersistence = transient
osp.web.server.securePort = 0

# Note: unofficial list of V8 options can be found here:
# https://github.com/thlorenz/v8-flags/blob/master/flags-0.11.md
osp.js.v8.flags = --harmony;--use-strict


#
# Settings
#
macchina.settings.path = ${application.configDir}settings.properties
macchina.hideConsoleWindow = true
dds.configTopic = stok.ui.config


#
# stok Services
#
stok.services.directory = ${application.configDir}../services
stok.services.autostart = market-data-service;desktop-shell;portfolio-board;market-board;valuation-research;risk-backtest;trade-alerts;data-hub;config-center
stok.services.keepAlive.enabled = true
stok.services.keepAlive.restartDelayMs = 0
stok.services.market-data-service.command = stok-market-data-service
stok.services.market-data-service.arguments = --config=${application.configDir}../services/runtime/market-data-service/config.properties
stok.services.market-data-service.workingDir = ${application.configDir}../services/runtime/market-data-service
stok.services.market-data-service.gracefulStop = true
stok.services.desktop-shell.command = stok-desktop-shell
stok.services.desktop-shell.arguments = --config=${application.configDir}../services/runtime/desktop-shell/config.properties
stok.services.desktop-shell.workingDir = ${application.configDir}../services/runtime/desktop-shell
stok.services.desktop-shell.gracefulStop = false
stok.services.desktop-shell.terminateServerOnExit = true
stok.services.desktop-shell.keepAlive = false
stok.services.desktop-shell.forceShowWindow = false
stok.services.market-board.command = stok-market-board
stok.services.market-board.arguments = --config=${application.configDir}../services/runtime/market-board/config.properties
stok.services.market-board.workingDir = ${application.configDir}../services/runtime/market-board
stok.services.market-board.gracefulStop = false
stok.services.config-center.command = stok-config-center
stok.services.config-center.arguments = --config=${application.configDir}../services/runtime/config-center/config.properties
stok.services.config-center.workingDir = ${application.configDir}../services/runtime/config-center
stok.services.config-center.gracefulStop = false
stok.services.config-center.keepAlive = false
stok.services.portfolio-board.command = stok-portfolio-board
stok.services.portfolio-board.arguments = --config=${application.configDir}../services/runtime/portfolio-board/config.properties
stok.services.portfolio-board.workingDir = ${application.configDir}../services/runtime/portfolio-board
stok.services.portfolio-board.gracefulStop = false
stok.services.valuation-research.command = stok-valuation-research
stok.services.valuation-research.arguments = --config=${application.configDir}../services/runtime/valuation-research/config.properties
stok.services.valuation-research.workingDir = ${application.configDir}../services/runtime/valuation-research
stok.services.valuation-research.gracefulStop = false
stok.services.risk-backtest.command = stok-risk-backtest
stok.services.risk-backtest.arguments = --config=${application.configDir}../services/runtime/risk-backtest/config.properties
stok.services.risk-backtest.workingDir = ${application.configDir}../services/runtime/risk-backtest
stok.services.risk-backtest.gracefulStop = false
stok.services.trade-alerts.command = stok-trade-alerts
stok.services.trade-alerts.arguments = --config=${application.configDir}../services/runtime/trade-alerts/config.properties
stok.services.trade-alerts.workingDir = ${application.configDir}../services/runtime/trade-alerts
stok.services.trade-alerts.gracefulStop = false
stok.services.data-hub.command = stok-data-hub
stok.services.data-hub.arguments = --config=${application.configDir}../services/runtime/data-hub/config.properties
stok.services.data-hub.workingDir = ${application.configDir}../services/runtime/data-hub
stok.services.data-hub.gracefulStop = false
stok.services.log-viewer.command = stok-log-viewer
stok.services.log-viewer.arguments = --config=${application.configDir}../services/runtime/log-viewer/config.properties
stok.services.log-viewer.workingDir = ${application.configDir}../services/runtime/log-viewer
stok.services.log-viewer.gracefulStop = false


#
# Telemetry Export
#
telemetry.service.name = ${application.baseName}
telemetry.service.version = 0.1.0
telemetry.export.enabled = false
telemetry.export.traces = true
telemetry.export.logs = true
telemetry.export.metrics = true
telemetry.export.otlp.endpoint =
telemetry.export.otlp.tracesPath = /v1/traces
telemetry.export.otlp.logsPath = /v1/logs
telemetry.export.otlp.metricsPath = /v1/metrics
telemetry.export.otlp.timeout = 1000
telemetry.export.otlp.scheduleDelay = 1000
telemetry.export.metrics.interval = 3000
# Set the endpoint in settings.properties, e.g.:
# telemetry.export.otlp.endpoint = http://192.168.238.129:4318
# Optional headers, separated by semicolons. Example:
# telemetry.export.otlp.headers = Authorization=Bearer token;X-Tenant=myiot
telemetry.export.otlp.headers =
telemetry.export.otlp.insecureSkipVerify = false
telemetry.export.otlp.consoleDebug = false
# Optional resource attributes used to distinguish one physical device from another
# in traces, logs and metrics. By default, these follow the WebTunnel device identity.
telemetry.resource.device.id = ${webtunnel.deviceId}
telemetry.resource.device.name = ${webtunnel.deviceName}
telemetry.resource.instance.id = ${webtunnel.deviceId}
telemetry.resource.host.name = ${system.nodeName}


